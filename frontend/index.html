<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIGMA Terminal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <h1>SIGMA</h1>
      <p class="subtitle">Strategic Intelligence & Graph Metadata Analyzer</p>
    </header>

    <!-- CHAT -->
    <main class="chat-container" id="chatContainer">
      <div class="welcome">
        <p>Enter a target to begin investigation.</p>
        <span class="hint">username • image • url</span>
      </div>
    </main>

    <!-- INPUT -->
    <div class="input-container">

      <button class="upload-btn" id="uploadBtn">+</button>
      <input type="file" id="fileInput" accept="image/*" hidden />

      <div class="input-wrapper">
        <textarea
          id="userInput"
          placeholder="Type a username, URL, or describe an image..."
          rows="1"
        ></textarea>

        <!-- IMAGE CHIP PREVIEW -->
        <div id="imagePreview" class="image-preview"></div>
      </div>

      <button class="send-btn" id="sendBtn">→</button>

    </div>

  </div>

  <script>
    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("fileInput");
    const sendBtn = document.getElementById("sendBtn");
    const userInput = document.getElementById("userInput");
    const chatContainer = document.getElementById("chatContainer");
    const imagePreview = document.getElementById("imagePreview");

    let selectedFile = null;

    uploadBtn.onclick = () => fileInput.click();

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      selectedFile = file;
      imagePreview.innerHTML = "";
      const chip = document.createElement("div");
      chip.className = "preview-chip";
      const img = document.createElement("img");
      img.src = URL.createObjectURL(file);
      const name = document.createElement("span");
      name.textContent = file.name;
      const remove = document.createElement("button");
      remove.textContent = "✕";
      remove.onclick = () => {
        selectedFile = null;
        fileInput.value = "";
        imagePreview.innerHTML = "";
      };
      chip.appendChild(img);
      chip.appendChild(name);
      chip.appendChild(remove);
      imagePreview.appendChild(chip);
    });

    sendBtn.onclick = async () => {
      const text = userInput.value.trim();
      if (!text && !selectedFile) return;

      const welcome = document.querySelector(".welcome");
      if (welcome) welcome.remove();

      const userMsg = document.createElement("div");
      userMsg.className = "message user";
      const t = document.createElement("div");
      t.textContent = text;
      userMsg.appendChild(t);
      chatContainer.appendChild(userMsg);

      const agentMsg = document.createElement("div");
      agentMsg.className = "message assistant";
      agentMsg.textContent = "[SIGMA] Starting investigation...";
      chatContainer.appendChild(agentMsg);

      const formData = new FormData();
      formData.append("text", text);
      if (selectedFile) formData.append("image", selectedFile);

      try {
        const res = await fetch("/investigate", { method: "POST", body: formData });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split("\n").filter(l => l.startsWith("data:"));

          for (const line of lines) {
            const data = JSON.parse(line.replace("data: ", ""));

            if (data.agent === "ERROR") {
              agentMsg.textContent += `\n[ERROR] ${data.message}`;
            } else if (data.agent !== "COMPLETE") {
              agentMsg.textContent += `\n[${data.agent}] ${data.message}`;
            } else {
              const report = data.report;
              agentMsg.innerHTML = `
                <div class="report">
                  <div class="report-header">⬛ ${report.classification}</div>
                  <div class="report-section">
                    <div class="section-title">SUBJECT PROFILE</div>
                    <div><span class="label">Name:</span> ${report.subject_profile.likely_name || "UNKNOWN"}</div>
                    <div><span class="label">Username:</span> ${report.subject_profile.username}</div>
                    <div class="summary">${report.subject_profile.summary}</div>
                  </div>
                  <div class="report-section">
                    <div class="section-title">DIGITAL FOOTPRINT</div>
                    <div><span class="label">Confirmed:</span> ${report.digital_footprint.platforms_confirmed.join(", ") || "none"}</div>
                    <div class="summary">${report.digital_footprint.summary}</div>
                  </div>
                  <div class="report-section">
                    <div class="section-title">LOCATION ESTIMATE</div>
                    <div><span class="label">Region:</span> ${report.location_estimate.region}</div>
                    <div><span class="label">Confidence:</span> ${(report.location_estimate.confidence * 100).toFixed(0)}%</div>
                    <div class="summary">${report.location_estimate.reasoning}</div>
                  </div>
                  <div class="report-section">
                    <div class="section-title">BEHAVIORAL ANALYSIS</div>
                    <div class="summary">${report.behavioral_analysis.summary}</div>
                  </div>
                  <div class="report-section">
                    <div class="section-title">CONFIDENCE METRICS</div>
                    <div><span class="label">Identity:</span> ${(report.confidence_metrics.identity * 100).toFixed(0)}%</div>
                    <div><span class="label">Location:</span> ${(report.confidence_metrics.location * 100).toFixed(0)}%</div>
                    <div><span class="label">Occupation:</span> ${(report.confidence_metrics.occupation * 100).toFixed(0)}%</div>
                    <div><span class="label">Overall:</span> ${(report.confidence_metrics.overall * 100).toFixed(0)}%</div>
                  </div>
                  <div class="report-section analyst">
                    <div class="section-title">ANALYST NOTE</div>
                    <div class="summary">${report.analyst_note}</div>
                  </div>
                </div>
              `;
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
          }
        }
      } catch (err) {
        agentMsg.textContent = "Backend error: " + err.message;
      }

      userInput.value = "";
      selectedFile = null;
      fileInput.value = "";
      imagePreview.innerHTML = "";
    };

    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });
  </script>

</body>
</html>
