<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIGMA Terminal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">INVESTIGATIONS</span>
        <button class="sidebar-new" id="newChatBtn" title="New investigation">+</button>
      </div>
      <div class="sidebar-list" id="historyList"></div>
    </aside>

    <!-- MAIN -->
    <div class="main">

      <!-- HEADER -->
      <header class="header">
        <button class="sidebar-toggle" id="sidebarToggle">☰</button>
        <div class="header-center">
          <h1>SIGMA</h1>
          <p class="subtitle">Strategic Intelligence & Graph Metadata Analyzer</p>
        </div>
        <div class="header-right">
          <canvas id="orbCanvas" width="44" height="44" title="System status"></canvas>
        </div>
      </header>

      <!-- CHAT -->
      <main class="chat-container" id="chatContainer">
        <div class="welcome" id="welcomeMsg">
          <div class="welcome-logo">⬡</div>
          <p>Enter a target to begin investigation.</p>
          <span class="hint">username • image • url</span>
        </div>
      </main>

      <!-- INPUT -->
      <div class="input-area">
        <div class="input-box" id="inputBox">
          <div class="input-top">
            <textarea
              id="userInput"
              placeholder="Type a username, URL, or upload an image..."
              rows="1"
            ></textarea>
          </div>
          <div class="input-bottom">
            <div class="input-left-controls">
              <button class="ctrl-btn" id="uploadBtn" title="Attach image">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <input type="file" id="fileInput" accept="image/*" hidden />
              <div id="imagePreview" class="image-preview"></div>
            </div>
            <button class="send-btn" id="sendBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
        <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
      </div>

    </div>
  </div>

  <script>
    // ─── ORB ANIMATION ────────────────────────────────────────
    const orbCanvas = document.getElementById("orbCanvas");
    const orbCtx = orbCanvas.getContext("2d");
    let orbActive = false;
    let orbTime = 0;
    let orbRotation = 0;
    const density = ' .:-=+*#%@';

    function drawOrb() {
      const W = orbCanvas.width;
      const H = orbCanvas.height;
      const cx = W / 2;
      const cy = H / 2;
      const radius = W * 0.36;

      orbCtx.clearRect(0, 0, W, H);

      const glowAlpha = orbActive
        ? 0.5 + Math.sin(orbTime * 6) * 0.3
        : 0.18 + Math.sin(orbTime * 1.2) * 0.06;
      const hue = orbActive ? 160 + Math.sin(orbTime * 3) * 40 : 168;

      // outer glow
      const glow = orbCtx.createRadialGradient(cx, cy, 0, cx, cy, radius * 1.8);
      glow.addColorStop(0, `hsla(${hue}, 100%, 70%, ${glowAlpha})`);
      glow.addColorStop(0.5, `hsla(${hue + 20}, 80%, 50%, ${glowAlpha * 0.4})`);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      orbCtx.fillStyle = glow;
      orbCtx.fillRect(0, 0, W, H);

      // ASCII sphere
      orbCtx.font = '4px monospace';
      orbCtx.textAlign = 'center';
      orbCtx.textBaseline = 'middle';
      const spacing = 4;
      const cols = Math.floor(W / spacing);
      const rows = Math.floor(H / spacing);

      for (let i = 0; i < cols; i++) {
        for (let j = 0; j < rows; j++) {
          const x = (i - cols / 2) * spacing + cx;
          const y = (j - rows / 2) * spacing + cy;
          const dx = x - cx;
          const dy = y - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < radius) {
            const z = Math.sqrt(Math.max(0, radius * radius - dx * dx - dy * dy));
            const rotZ = dx * Math.sin(orbRotation) + z * Math.cos(orbRotation);
            const brightness = (rotZ + radius) / (radius * 2);

            if (rotZ > -radius * 0.2) {
              let char;
              if (orbActive && Math.random() < 0.08) {
                const glitchChars = ['█','▓','▒','░','▄','▀'];
                char = glitchChars[Math.floor(Math.random() * glitchChars.length)];
              } else {
                char = density[Math.floor(brightness * (density.length - 1))];
              }
              const alpha = Math.max(0.15, brightness);
              orbCtx.fillStyle = `hsla(${hue + 20}, 100%, 85%, ${alpha})`;
              orbCtx.fillText(char, x, y);
            }
          }
        }
      }

      // ring
      orbCtx.strokeStyle = `hsla(${hue}, 100%, 70%, ${glowAlpha * 1.2})`;
      orbCtx.lineWidth = orbActive ? 1.5 : 0.8;

      if (orbActive) {
        const segs = 8;
        for (let i = 0; i < segs; i++) {
          if (Math.random() < 0.2) continue;
          const sa = (i / segs) * Math.PI * 2;
          const ea = ((i + 1) / segs) * Math.PI * 2;
          orbCtx.beginPath();
          orbCtx.arc(cx, cy, radius * 1.25 + (Math.random() - 0.5) * 3, sa, ea);
          orbCtx.stroke();
        }
      } else {
        orbCtx.beginPath();
        orbCtx.arc(cx, cy, radius * 1.25, 0, Math.PI * 2);
        orbCtx.stroke();
      }

      orbRotation += orbActive ? 0.04 : 0.008;
      orbTime += 0.016;
      requestAnimationFrame(drawOrb);
    }

    drawOrb();

    function setOrbActive(active) { orbActive = active; }

    // ─── STATE ───────────────────────────────────────────────
    let sessions = JSON.parse(localStorage.getItem("sigma_sessions") || "[]");
    let currentSessionId = null;
    let selectedFile = null;

    // ─── ELEMENTS ─────────────────────────────────────────────
    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("fileInput");
    const sendBtn = document.getElementById("sendBtn");
    const userInput = document.getElementById("userInput");
    const chatContainer = document.getElementById("chatContainer");
    const imagePreview = document.getElementById("imagePreview");
    const historyList = document.getElementById("historyList");
    const newChatBtn = document.getElementById("newChatBtn");
    const sidebarToggle = document.getElementById("sidebarToggle");
    const sidebar = document.getElementById("sidebar");

    sidebarToggle.onclick = () => sidebar.classList.toggle("open");

    // ─── SESSION MANAGEMENT ───────────────────────────────────
    function createSession(label) {
      const id = Date.now().toString();
      const session = { id, label, messages: [] };
      sessions.unshift(session);
      saveSessions();
      return session;
    }

    function saveSessions() {
      localStorage.setItem("sigma_sessions", JSON.stringify(sessions));
    }

    function renderHistory() {
      historyList.innerHTML = "";
      sessions.forEach(s => {
        const item = document.createElement("div");
        item.className = "history-item" + (s.id === currentSessionId ? " active" : "");
        item.innerHTML = `
          <span class="history-label">${s.label}</span>
          <button class="history-delete" data-id="${s.id}" title="Delete">✕</button>
        `;
        item.onclick = (e) => {
          if (e.target.classList.contains("history-delete")) {
            sessions = sessions.filter(x => x.id !== s.id);
            saveSessions();
            if (currentSessionId === s.id) startNewChat();
            else renderHistory();
            return;
          }
          loadSession(s.id);
        };
        historyList.appendChild(item);
      });
    }

    function loadSession(id) {
      currentSessionId = id;
      const session = sessions.find(s => s.id === id);
      chatContainer.innerHTML = "";
      session.messages.forEach(m => {
        if (m.role === "user") appendUserMessage(m.text, false);
        else if (m.role === "agent") appendAgentLog(m.text, false);
        else if (m.role === "report") appendReport(m.data, false);
      });
      renderHistory();
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function startNewChat() {
      currentSessionId = null;
      chatContainer.innerHTML = `
        <div class="welcome" id="welcomeMsg">
          <div class="welcome-logo">⬡</div>
          <p>Enter a target to begin investigation.</p>
          <span class="hint">username • image • url</span>
        </div>
      `;
      renderHistory();
    }

    newChatBtn.onclick = startNewChat;

    // ─── MESSAGE RENDERERS ────────────────────────────────────
    function appendUserMessage(text, save = true) {
      const welcome = document.getElementById("welcomeMsg");
      if (welcome) welcome.remove();

      const row = document.createElement("div");
      row.className = "msg-row user-row";
      row.innerHTML = `
        <div class="message user">${text}</div>
        <div class="avatar user-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </div>
      `;
      chatContainer.appendChild(row);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      if (save && currentSessionId) {
        const s = sessions.find(x => x.id === currentSessionId);
        if (s) { s.messages.push({ role: "user", text }); saveSessions(); }
      }
      return row;
    }

    function appendAgentLog(text, save = true) {
      let el = chatContainer.querySelector(".agent-log-active");
      if (!el) {
        const row = document.createElement("div");
        row.className = "msg-row agent-row";
        row.innerHTML = `
          <div class="avatar sigma-avatar">Σ</div>
          <div class="message assistant agent-log-active"></div>
        `;
        chatContainer.appendChild(row);
        el = row.querySelector(".agent-log-active");
      }
      el.textContent = text;
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return el;
    }

    function finalizeAgentLog(el, text) {
      el.classList.remove("agent-log-active");
      if (currentSessionId) {
        const s = sessions.find(x => x.id === currentSessionId);
        if (s) { s.messages.push({ role: "agent", text }); saveSessions(); }
      }
    }

    function appendReport(report, save = true) {
      const row = document.createElement("div");
      row.className = "msg-row agent-row";
      row.innerHTML = `
        <div class="avatar sigma-avatar">Σ</div>
        <div class="message assistant">${buildReportHTML(report)}</div>
      `;
      chatContainer.appendChild(row);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      if (save && currentSessionId) {
        const s = sessions.find(x => x.id === currentSessionId);
        if (s) { s.messages.push({ role: "report", data: report }); saveSessions(); }
      }
    }

    function buildReportHTML(report) {
      return `
        <div class="report">
          <div class="report-header">
            <span class="report-badge">CLASSIFIED</span>
            ${report.classification}
          </div>
          <div class="report-grid">
            <div class="report-section">
              <div class="section-title">▸ SUBJECT PROFILE</div>
              <div class="field"><span class="label">Name</span><span>${report.subject_profile.likely_name || "UNKNOWN"}</span></div>
              <div class="field"><span class="label">Username</span><span>${report.subject_profile.username}</span></div>
              <div class="summary">${report.subject_profile.summary}</div>
            </div>
            <div class="report-section">
              <div class="section-title">▸ DIGITAL FOOTPRINT</div>
              <div class="field"><span class="label">Confirmed</span><span>${(report.digital_footprint.platforms_confirmed || []).join(", ") || "none"}</span></div>
              <div class="summary">${report.digital_footprint.summary}</div>
            </div>
            <div class="report-section">
              <div class="section-title">▸ LOCATION ESTIMATE</div>
              <div class="field"><span class="label">Region</span><span>${report.location_estimate.region}</span></div>
              <div class="confidence-bar-wrap">
                <span class="label">Confidence</span>
                <div class="confidence-bar"><div class="confidence-fill" style="width:${(report.location_estimate.confidence * 100).toFixed(0)}%"></div></div>
                <span class="conf-pct">${(report.location_estimate.confidence * 100).toFixed(0)}%</span>
              </div>
              <div class="summary">${report.location_estimate.reasoning}</div>
            </div>
            <div class="report-section">
              <div class="section-title">▸ BEHAVIORAL ANALYSIS</div>
              <div class="summary">${report.behavioral_analysis.summary}</div>
            </div>
            <div class="report-section metrics-section">
              <div class="section-title">▸ CONFIDENCE METRICS</div>
              ${["identity","location","occupation","overall"].map(k => `
                <div class="metric-row">
                  <span class="metric-label">${k}</span>
                  <div class="confidence-bar"><div class="confidence-fill ${k === 'overall' ? 'overall' : ''}" style="width:${(report.confidence_metrics[k] * 100).toFixed(0)}%"></div></div>
                  <span class="conf-pct">${(report.confidence_metrics[k] * 100).toFixed(0)}%</span>
                </div>
              `).join("")}
            </div>
            <div class="report-section analyst-section">
              <div class="section-title">▸ ANALYST NOTE</div>
              <div class="summary analyst-text">${report.analyst_note}</div>
            </div>
          </div>
        </div>
      `;
    }

    // ─── FILE UPLOAD ──────────────────────────────────────────
    uploadBtn.onclick = () => fileInput.click();

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      selectedFile = file;
      imagePreview.innerHTML = "";
      const chip = document.createElement("div");
      chip.className = "preview-chip";
      const img = document.createElement("img");
      img.src = URL.createObjectURL(file);
      const name = document.createElement("span");
      name.textContent = file.name;
      const remove = document.createElement("button");
      remove.textContent = "✕";
      remove.onclick = () => {
        selectedFile = null;
        fileInput.value = "";
        imagePreview.innerHTML = "";
      };
      chip.appendChild(img);
      chip.appendChild(name);
      chip.appendChild(remove);
      imagePreview.appendChild(chip);
    });

    // ─── SEND ─────────────────────────────────────────────────
    sendBtn.onclick = async () => {
      const text = userInput.value.trim();
      if (!text && !selectedFile) return;

      if (!currentSessionId) {
        const session = createSession(text.slice(0, 30) || "Image investigation");
        currentSessionId = session.id;
        renderHistory();
      }

      appendUserMessage(text);

      const agentEl = appendAgentLog("[SIGMA] Starting investigation...");
      let agentText = "[SIGMA] Starting investigation...";

      const formData = new FormData();
      formData.append("text", text);
      if (selectedFile) formData.append("image", selectedFile);

      setOrbActive(true);

      try {
        const res = await fetch("/investigate", { method: "POST", body: formData });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split("\n").filter(l => l.startsWith("data:"));

          for (const line of lines) {
            const data = JSON.parse(line.replace("data: ", ""));

            if (data.agent === "ERROR") {
              agentText += `\n[ERROR] ${data.message}`;
              appendAgentLog(agentText);
            } else if (data.agent !== "COMPLETE") {
              agentText += `\n[${data.agent}] ${data.message}`;
              appendAgentLog(agentText);
            } else {
              finalizeAgentLog(agentEl, agentText);
              appendReport(data.report);
              setOrbActive(false);
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
          }
        }
      } catch (err) {
        agentEl.textContent = "Backend error: " + err.message;
        agentEl.classList.remove("agent-log-active");
        setOrbActive(false);
      }

      userInput.value = "";
      userInput.style.height = "auto";
      userInput.blur();
      selectedFile = null;
      fileInput.value = "";
      imagePreview.innerHTML = "";
    };

    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });

    userInput.addEventListener("input", () => {
      userInput.style.height = "auto";
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + "px";
    });

    renderHistory();
  </script>

</body>
</html>
